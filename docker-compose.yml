services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: bank-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: bank-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: bank-zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://bank-kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: authdb
      DB_USER: bank
      DB_PASS: bank
      JWT_SECRET: vmHgXHrfY7+r0JW9nkwc68ZSJeKDBgXEJGjD1PT9m3U=
    depends_on:
      - mysql
    restart: unless-stopped

  account-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: account-service
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: accountdb
      DB_USER: bank
      DB_PASS: bank
      JWT_SECRET: vmHgXHrfY7+r0JW9nkwc68ZSJeKDBgXEJGjD1PT9m3U=
    depends_on:
      - mysql
    restart: unless-stopped

  ledger-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: ledger-service
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ledgerdb
      DB_USER: bank
      DB_PASS: bank
      KAFKA_BOOTSTRAP: bank-kafka:9092
    depends_on:
      - mysql
      - kafka
    ports:
      - "9090:9090"
    restart: unless-stopped

  transfer-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: transfer-service
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: transferdb
      DB_USER: bank
      DB_PASS: bank
      JWT_SECRET: vmHgXHrfY7+r0JW9nkwc68ZSJeKDBgXEJGjD1PT9m3U=
      KAFKA_BOOTSTRAP: bank-kafka:9092
      LEDGER_GRPC_HOST: ledger-service
      LEDGER_GRPC_PORT: 9090
    depends_on:
      - mysql
      - kafka
      - ledger-service
    restart: unless-stopped

  statement-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: statement-service
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: statementdb
      DB_USER: bank
      DB_PASS: bank
      JWT_SECRET: vmHgXHrfY7+r0JW9nkwc68ZSJeKDBgXEJGjD1PT9m3U=
      KAFKA_BOOTSTRAP: bank-kafka:9092
    depends_on:
      - mysql
      - kafka
    restart: unless-stopped

  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: analytics-service
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: analyticsdb
      DB_USER: bank
      DB_PASS: bank
      KAFKA_BOOTSTRAP: bank-kafka:9092
    depends_on:
      - mysql
      - kafka
    restart: unless-stopped

  audit-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: audit-service
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: auditdb
      DB_USER: bank
      DB_PASS: bank
      KAFKA_BOOTSTRAP: bank-kafka:9092
    depends_on:
      - mysql
      - kafka
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    environment:
      JWT_SECRET: vmHgXHrfY7+r0JW9nkwc68ZSJeKDBgXEJGjD1PT9m3U=
    depends_on:
      - auth-service
      - account-service
      - transfer-service
      - statement-service
      - analytics-service
      - audit-service
    ports:
      - "8080:8080"
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: bank-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bank
      MYSQL_USER: bank
      MYSQL_PASSWORD: bank
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    restart: unless-stopped

networks:
  default:
    name: baas-net